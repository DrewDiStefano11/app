name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        id: typescript
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Check formatting
        id: formatting
        continue-on-error: true
        run: npx prettier --check .

      - name: Build production bundle
        id: build
        continue-on-error: true
        run: npm run build

      - name: Enforce validation results
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.typescript.outcome }}" != "success" || \
                "${{ steps.lint.outcome }}" != "success" || \
                "${{ steps.formatting.outcome }}" != "success" || \
                "${{ steps.build.outcome }}" != "success" ]]; then
            exit 1
          fi
