name: Feature Request
description: Suggest a new feature or improvement for FitCore
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      placeholder: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      placeholder: Why is this feature needed?
    validations:
      required: true
  - type: input
    id: screen
    attributes:
      label: Which screen/section it affects
      placeholder: e.g. Nutrition, Progress
  - type: textarea
    id: behavior
    attributes:
      label: Desired behavior
      placeholder: Describe how the feature should work
  - type: textarea
    id: data-impact
    attributes:
      label: Data/logging impact
      placeholder: Does this change how data is stored or logged?
  - type: textarea
    id: ai-impact
    attributes:
      label: AI impact, if any
      placeholder: Does this involve Jarvis or other AI features?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
