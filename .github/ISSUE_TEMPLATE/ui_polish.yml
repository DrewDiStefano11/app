name: UI Polish
description: Suggest visual or UX improvements
labels: ["ui-polish"]
body:
  - type: input
    id: screen
    attributes:
      label: Screen/section
      placeholder: e.g. Navigation, Charts, Cards
    validations:
      required: true
  - type: textarea
    id: clunky
    attributes:
      label: What feels clunky?
      placeholder: Describe the current UI/UX friction
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired premium/clean behavior
      placeholder: How can we make it feel more "polished"?
  - type: input
    id: screenshots
    attributes:
      label: Screenshot/video
      placeholder: Link or drag-and-drop images here
  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: Mobile size tested
        - label: It affects charts, cards, popups, nav, or forms
